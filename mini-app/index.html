<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetNinja - Secure & Fast Connection</title>
    <meta name="description" content="Premium VPN service with stealth technology">
    <meta name="theme-color" content="#0a0a14">
    
    <!-- Icons -->
<link rel="icon" href="/assets/icons/interface/icon_profile.png">
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Styles will be injected by Vite -->
    <style>
        /* Minimal fallback styles */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0a0a14;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            font-size: 18px;
            color: #8B5CF6;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(139, 92, 246, 0.2);
            border-top: 4px solid #8B5CF6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <span>Loading NetNinja...</span>
        </div>
    </div>
    
    <!-- Script will be injected by Vite -->
    <script type="module" src="/src/main.jsx"></script>
